<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinite Todo</title>
<style>
html,body{margin:0;padding:0;background:#f1ebdf;scrollbar-width:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0}
a{color:#8a6a2f}a:hover{color:#6f5424}
input[data-done="1"]{text-decoration:line-through;opacity:.5}
input::placeholder{color:#bcad90}
body{min-height:100vh;display:flex;justify-content:center}
#page{width:1200px;max-width:100%;background:#faf5ea;border-left:1px solid rgba(120,90,40,.11);border-right:1px solid rgba(120,90,40,.11);padding:92px 120px 320px;box-sizing:border-box}
.row{display:flex;align-items:flex-start;gap:12px;padding:3px 0}
.cb{flex:none;width:18px;height:18px;border-radius:4px;border:1.5px solid #cbb894;background:transparent;margin-top:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:#fff;font-size:12px;line-height:1}
.row input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:16px;line-height:1.7;color:#43392a;padding:0}
</style>
</head>
<body>
<div id="page"></div>
<script>
const accent = '#9c7a3c';
const cbBorderIdle = '#cbb894';
let nextId = 31;
let lines = [
  { id: 1, text: 'Plan gym schedule for Q3', done: false, depth: 0 },
  { id: 2, text: 'Book 3 climbing sessions', done: true, depth: 1 },
  { id: 3, text: 'Order lifting shoes', done: false, depth: 1 },
  { id: 4, text: 'Draft the routine — push / pull / legs', done: false, depth: 1 },
  { id: 5, text: 'Block Tue + Thu mornings on calendar', done: false, depth: 2 },
  { id: 6, text: 'Ship the infinite textbox', done: false, depth: 0 },
  { id: 7, text: 'Auto-focus on load', done: true, depth: 1 },
  { id: 8, text: 'Hide the scrollbar', done: true, depth: 1 },
  { id: 9, text: 'Tab hierarchy + arrow-key caret nav', done: true, depth: 1 },
  { id: 10, text: 'Persist every line with created_at', done: false, depth: 1 },
  { id: 11, text: 'Parent auto-checks when all children done', done: false, depth: 1 },
  { id: 12, text: 'Draft the milestones doc', done: true, depth: 0 },
  { id: 13, text: 'Weekly review', done: false, depth: 0 },
  { id: 14, text: 'Reconcile committed-but-unplanned hours', done: false, depth: 1 },
  { id: 15, text: 'Move floating blocks into time slots', done: false, depth: 1 },
  { id: 16, text: 'Tag pass — climb, gym, ship, review', done: false, depth: 1 },
  { id: 17, text: 'Groceries', done: false, depth: 0 },
  { id: 18, text: 'Oats, eggs, greens', done: true, depth: 1 },
  { id: 19, text: 'Coffee', done: false, depth: 1 },
  { id: 20, text: 'Read: chapter on hierarchical planning', done: false, depth: 0 },
  { id: 21, text: 'Take notes on time allocation model', done: false, depth: 1 },
  { id: 22, text: 'Call the dentist', done: false, depth: 0 },
  { id: 23, text: 'Renew library books', done: true, depth: 0 },
  { id: 24, text: 'Fix the leaky kitchen tap', done: false, depth: 0 },
  { id: 25, text: 'Buy washer + O-ring', done: false, depth: 1 },
  { id: 26, text: 'Plan weekend hike', done: false, depth: 0 },
  { id: 27, text: 'Check trail conditions', done: false, depth: 1 },
  { id: 28, text: 'Pack layers + water', done: false, depth: 1 },
  { id: 29, text: 'Reply to Sam about the schedule', done: false, depth: 0 },
  { id: 30, text: '', done: false, depth: 0 },
];

const page = document.getElementById('page');
let pending = null;
let pendingCol = null;

function render() {
  page.textContent = '';
  const frag = document.createDocumentFragment();
  for (const l of lines) {
    const row = document.createElement('div');
    row.className = 'row';
    row.style.marginLeft = (l.depth * 28) + 'px';

    const btn = document.createElement('button');
    btn.className = 'cb';
    btn.dataset.id = l.id;
    btn.style.background = l.done ? accent : 'transparent';
    btn.style.borderColor = l.done ? accent : cbBorderIdle;
    btn.textContent = l.done ? '✓' : '';
    btn.addEventListener('click', toggle);

    const input = document.createElement('input');
    input.dataset.id = l.id;
    input.dataset.done = l.done ? '1' : '0';
    input.value = l.text;
    input.placeholder = 'To-do';
    input.addEventListener('input', edit);
    input.addEventListener('keydown', keydown);

    row.append(btn, input);
    frag.append(row);
  }
  page.append(frag);
  focusPending();
}

function edit(e) {
  const id = e.target.dataset.id;
  const l = lines.find(x => String(x.id) === id);
  if (l) l.text = e.target.value;
}

function toggle(e) {
  const id = e.currentTarget.dataset.id;
  lines = lines.map(l => String(l.id) === id ? { ...l, done: !l.done } : l);
  render();
}

function blankFocus(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  const inputs = document.querySelectorAll('input[data-id]');
  const last = inputs[inputs.length - 1];
  if (last) { e.preventDefault(); last.focus(); const v = last.value; last.setSelectionRange(v.length, v.length); }
}

let _mc = null;
function measureCtx() {
  if (!_mc) _mc = document.createElement('canvas');
  const ctx = _mc.getContext('2d');
  ctx.font = "16px -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif";
  return ctx;
}

function moveCaret(fromLine, toLine, col) {
  const ctx = measureCtx();
  const INDENT = 28;
  const srcW = ctx.measureText((fromLine.text || '').slice(0, col)).width;
  const targetW = srcW + (fromLine.depth - toLine.depth) * INDENT;
  const text = toLine.text || '';
  let best = 0, bestDiff = Infinity;
  for (let i = 0; i <= text.length; i++) {
    const d = Math.abs(ctx.measureText(text.slice(0, i)).width - targetW);
    if (d < bestDiff) { bestDiff = d; best = i; }
  }
  const el = document.querySelector('input[data-id="' + toLine.id + '"]');
  if (el) { el.focus(); el.setSelectionRange(best, best); }
}

function keydown(e) {
  const id = e.target.dataset.id;
  const arr = lines;
  const idx = arr.findIndex(l => String(l.id) === id);
  if (idx < 0) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    const nid = nextId++;
    const na = arr.slice();
    if (e.target.selectionStart === 0 && e.target.value !== '') {
      // caret at start: push current line down, insert empty above; caret stays on current line at 0
      na.splice(idx, 0, { id: nid, text: '', done: false, depth: arr[idx].depth });
      pending = arr[idx].id;
      pendingCol = 0;
    } else {
      na.splice(idx + 1, 0, { id: nid, text: '', done: false, depth: arr[idx].depth });
      pending = nid;
    }
    lines = na;
    render();
  } else if (e.key === 'Backspace' && e.target.value === '' && arr.length > 1) {
    e.preventDefault();
    const prev = arr[idx - 1];
    lines = arr.filter((_, i) => i !== idx);
    if (prev) pending = prev.id;
    render();
  } else if (e.key === 'ArrowUp' && idx > 0) {
    e.preventDefault();
    moveCaret(arr[idx], arr[idx - 1], e.target.selectionStart);
  } else if (e.key === 'ArrowDown' && idx < arr.length - 1) {
    e.preventDefault();
    moveCaret(arr[idx], arr[idx + 1], e.target.selectionStart);
  } else if (e.key === 'Tab') {
    e.preventDefault();
    let d = arr[idx].depth + (e.shiftKey ? -1 : 1);
    d = Math.max(0, Math.min(6, d));
    pending = arr[idx].id;
    lines = arr.map((l, i) => i === idx ? { ...l, depth: d } : l);
    render();
  }
}

function focusPending() {
  if (pending == null) return;
  const el = document.querySelector('input[data-id="' + pending + '"]');
  if (el) {
    const v = el.value;
    const p = pendingCol != null ? pendingCol : v.length;
    el.focus();
    try { el.setSelectionRange(p, p); } catch (_) {}
  }
  pending = null;
  pendingCol = null;
}

document.addEventListener('mousedown', blankFocus);

render();
const inputs = document.querySelectorAll('input[data-id]');
const last = inputs[inputs.length - 1];
if (last) last.focus();
</script>
</body>
</html>
