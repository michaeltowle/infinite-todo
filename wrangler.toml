name = "infinite-todo"
main = "src/index.js"
compatibility_date = "2026-01-01"

# No public *.workers.dev URL — the only way in should be through the custom
# domain, so Cloudflare Access (milestone #2) can't be bypassed.
workers_dev = false

# Milestone #1: attach the private subdomain. Uncomment once x.michaeltowle.io
# has a (proxied) DNS record on the zone, then `wrangler deploy` from the
# machine that's `wrangler login`ed. Requires no code — Cloudflare provisions it.
# routes = [
#   { pattern = "x.michaeltowle.io", custom_domain = true }
# ]

# The scratchpad's state lives in a Durable Object, not D1. TodoTree holds the
# node tree in memory and persists one storage entry per node (`element:<id>`).
[[durable_objects.bindings]]
name = "TREE"
class_name = "TodoTree"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TodoTree"]
