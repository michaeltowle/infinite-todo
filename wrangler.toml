name = "infinite-todo"
main = "src/index.js"
compatibility_date = "2026-01-01"

# No public *.workers.dev URL — the only way in should be through the custom
# domain, so Cloudflare Access (milestone #2) can't be bypassed.
workers_dev = false

# Custom Domain: on deploy, Cloudflare provisions the proxied DNS record + TLS
# cert for x.michaeltowle.io itself (the michaeltowle.io zone must be on the
# account; there must be no pre-existing record for this exact hostname). With
# workers_dev = false, this domain is the only way in.
routes = [
  { pattern = "x.michaeltowle.io", custom_domain = true }
]

# The scratchpad's state lives in a Durable Object, not D1. TodoTree holds the
# node tree in memory and persists one storage entry per node (`element:<id>`).
[[durable_objects.bindings]]
name = "TREE"
class_name = "TodoTree"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TodoTree"]
